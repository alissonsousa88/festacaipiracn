  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ortant}\n    [data-r=\"kpi\"]{grid-template-columns:repeat(3,1fr)!important}\n    [data-r=\"kpi\"]>div:nth-child(3n){border-right:none!important}\n    [data-r=\"dash-body\"]{grid-template-columns:1fr!important}\n    [data-r=\"barr-dash\"],[data-r=\"barr-list\"],[data-r=\"estr\"],[data-r=\"estr-view\"],[data-r=\"det\"],[data-r=\"chk\"]{grid-template-columns:1fr!important}\n    [data-r=\"lider-kpi\"],[data-r=\"prodf\"],[data-r=\"vol-kpi\"]{grid-template-columns:repeat(2,1fr)!important}\n    [data-r=\"det-head\"],[data-r=\"lider-head\"]{flex-direction:column!important;align-items:flex-start!important;gap:14px}\n  }\n  @media (max-width:520px){\n    [data-r=\"kpi\"]{grid-template-columns:repeat(2,1fr)!important}\n    [data-r=\"kpi\"]>div:nth-child(3n){border-right:1px solid #e2d3b5!important}\n    [data-r=\"kpi\"]>div:nth-child(2n){border-right:none!important}\n    [data-r=\"prodf\"],[data-r=\"vol-kpi\"]{grid-template-columns:1fr!important}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<!-- ================= LOGIN ================= -->\n<sc-if value=\"{{ notLogged }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;background:radial-gradient(120% 90% at 50% -10%,#efe3cb 0%,#d9ccb0 60%,#c9b892 100%)\">\n  <div data-r=\"login-card\" style=\"width:100%;max-width:940px;display:grid;grid-template-columns:1fr 1fr;background:#f3ead7;border:1px solid #cdbb98;border-radius:16px;overflow:hidden;box-shadow:0 30px 70px -30px rgba(46,36,28,.6)\">\n    <!-- left brand -->\n    <div data-r=\"login-brand\" style=\"background:#2e241c;color:#f3ead7;padding:40px 38px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden\">\n      <div style=\"position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(255,255,255,.03) 0 14px,transparent 14px 28px)\"><\u002Fdiv>\n      <div style=\"position:relative\">\n        <div style=\"display:flex;gap:5px;margin-bottom:26px\">\n          <span style=\"width:26px;height:6px;border-radius:2px;background:#b5502e\"><\u002Fspan>\n          <span style=\"width:26px;height:6px;border-radius:2px;background:#c98a2b\"><\u002Fspan>\n          <span style=\"width:26px;height:6px;border-radius:2px;background:#6f7a4e\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font:500 11px 'Instrument Sans';letter-spacing:.24em;text-transform:uppercase;color:#c98a2b;margin-bottom:12px\">Sistema de Gestão<\u002Fdiv>\n        <div style=\"font:700 40px/1.02 'Bitter';letter-spacing:-.01em\">Festa Caipira<br>da Igreja<\u002Fdiv>\n        <div style=\"font:400 14px/1.55 'Instrument Sans';color:#c9b79a;margin-top:18px;max-width:300px\">Planejamento, escalas e prontidão das barracas em um só lugar. Do cardápio à desmontagem.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"position:relative;display:flex;align-items:baseline;gap:10px;margin-top:34px\">\n        <span style=\"font:700 34px 'Bitter';color:#e8a94a;line-height:1\">36<\u002Fspan>\n        <span style=\"font:400 13px 'Instrument Sans';color:#c9b79a\">dias para 07 de agosto de 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <!-- right roles -->\n    <div style=\"padding:40px 36px;display:flex;flex-direction:column;justify-content:center;gap:14px\">\n      <div style=\"font:600 20px 'Bitter';margin-bottom:2px\">Entrar como<\u002Fdiv>\n      <div style=\"font:400 13px 'Instrument Sans';color:#6b5c48;margin-bottom:8px\">Selecione seu perfil para acessar o painel.<\u002Fdiv>\n      <sc-for list=\"{{ loginRoles }}\" as=\"r\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ r.onClick }}\" style=\"text-align:left;border:1px solid #d8c8a8;background:#faf3e4;border-radius:11px;padding:15px 17px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:.12s\" style-hover=\"border-color:#b5502e;background:#fff;transform:translateY(-1px)\">\n          <span style=\"width:42px;height:42px;flex:none;border-radius:11px;background:{{ r.cor }};color:#fff;display:flex;align-items:center;justify-content:center;font:700 16px 'Bitter'\">{{ r.ini }}<\u002Fspan>\n          <span style=\"flex:1\">\n            <span style=\"display:block;font:600 15px 'Instrument Sans';color:#2e241c\">{{ r.nome }}<\u002Fspan>\n            <span style=\"display:block;font:400 12px 'Instrument Sans';color:#6b5c48;margin-top:2px\">{{ r.desc }}<\u002Fspan>\n          <\u002Fspan>\n          <span style=\"font:600 18px 'Bitter';color:#c3ac86\">›<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ================= APP SHELL ================= -->\n<sc-if value=\"{{ logged }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-r=\"shell\" style=\"display:flex;min-height:100vh;max-height:100vh;background:#e7ddca\">\n\n  <!-- SIDEBAR -->\n  <aside data-r=\"sidebar\" style=\"width:238px;flex:none;background:#2e241c;color:#e7d9c2;display:flex;flex-direction:column;padding:20px 14px\">\n    <div data-r=\"side-brand\" style=\"display:flex;align-items:center;gap:11px;padding:4px 8px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px\">\n      <span style=\"width:38px;height:38px;flex:none;border-radius:10px;background:#b5502e;color:#fff;display:flex;align-items:center;justify-content:center;font:700 15px 'Bitter'\">FC<\u002Fspan>\n      <span>\n        <span style=\"display:block;font:700 15px 'Bitter';color:#fff;line-height:1.05\">Festa Caipira<\u002Fspan>\n        <span style=\"display:block;font:400 11px 'Instrument Sans';color:#a8977c;margin-top:2px\">CN · 2026<\u002Fspan>\n      <\u002Fspan>\n    <\u002Fdiv>\n    <nav data-r=\"side-nav\" style=\"display:flex;flex-direction:column;gap:3px;flex:1\">\n      <sc-for list=\"{{ navItems }}\" as=\"n\" hint-placeholder-count=\"6\">\n        <button onclick=\"{{ n.onClick }}\" style=\"{{ n.style }}\">\n          <span style=\"width:6px;height:6px;border-radius:99px;background:{{ n.dot }};flex:none\"><\u002Fspan>\n          <span style=\"flex:1;text-align:left\">{{ n.label }}<\u002Fspan>\n          <sc-if value=\"{{ n.badge }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font:600 10px 'Instrument Sans';background:#b5502e;color:#fff;padding:1px 7px;border-radius:99px\">{{ n.badge }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div data-r=\"side-user\" style=\"border-top:1px solid rgba(255,255,255,.08);padding-top:14px;margin-top:10px\">\n      <div style=\"display:flex;align-items:center;gap:11px;padding:0 8px\">\n        <span style=\"width:34px;height:34px;flex:none;border-radius:99px;background:{{ userCor }};color:#fff;display:flex;align-items:center;justify-content:center;font:700 13px 'Bitter'\">{{ userIni }}<\u002Fspan>\n        <span style=\"flex:1;min-width:0\">\n          <span style=\"display:block;font:600 13px 'Instrument Sans';color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ userNome }}<\u002Fspan>\n          <span style=\"display:block;font:400 11px 'Instrument Sans';color:#a8977c\">{{ userPapel }}<\u002Fspan>\n        <\u002Fspan>\n        <button onclick=\"{{ logout }}\" title=\"Sair\" style=\"border:none;background:rgba(255,255,255,.08);color:#e7d9c2;width:30px;height:30px;border-radius:8px;cursor:pointer;font:600 13px 'Instrument Sans'\" style-hover=\"background:#b5502e;color:#fff\">⏻<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <!-- MAIN -->\n  <div data-r=\"main\" style=\"flex:1;display:flex;flex-direction:column;min-width:0\">\n    <!-- TOPBAR -->\n    <header data-r=\"topbar\" style=\"height:62px;flex:none;background:#f3ead7;border-bottom:1px solid #d8c8a8;display:flex;align-items:center;justify-content:space-between;padding:0 26px\">\n      <div style=\"display:flex;align-items:baseline;gap:11px\">\n        <span style=\"font:600 18px 'Bitter';color:#2e241c\">{{ pageTitle }}<\u002Fspan>\n        <span style=\"font:400 12.5px 'Instrument Sans';color:#8a7a64\">{{ pageSub }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px\">\n        <div style=\"display:flex;align-items:baseline;gap:7px;background:#9e3b2a;color:#f7ecd8;padding:6px 13px;border-radius:8px\">\n          <span style=\"font:700 17px 'Bitter';line-height:1\">36<\u002Fspan><span style=\"font:500 11px 'Instrument Sans'\">dias p/ festa<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;border:1px solid #cdbb98;border-radius:9px;overflow:hidden;font:600 12px 'Instrument Sans'\">\n          <sc-for list=\"{{ roleTabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">{{ t.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button data-r=\"mlogout\" onclick=\"{{ logout }}\" title=\"Sair\" style=\"border:1px solid #cdbb98;background:#faf3e4;color:#9e3b2a;width:34px;height:34px;border-radius:8px;cursor:pointer;font:600 14px 'Instrument Sans';align-items:center;justify-content:center\">⏻<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- CONTENT -->\n    <main data-r=\"content\" class=\"fc-scroll\" style=\"flex:1;padding:26px 30px 40px\">\n\n      <!-- ===== DASHBOARD (admin/pastoral) ===== -->\n      <sc-if value=\"{{ showDashAdmin }}\" hint-placeholder-val=\"{{ true }}\">\n        <!-- KPI strip -->\n        <div data-r=\"kpi\" style=\"display:grid;grid-template-columns:repeat(6,1fr);background:#f3ead7;border:1px solid #d8c8a8;border-radius:11px;overflow:hidden;margin-bottom:22px\">\n          <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"6\">\n            <div style=\"padding:16px 18px;border-right:1px solid #e2d3b5\">\n              <div style=\"font:700 30px/1 'Bitter';color:{{ k.cor }}\">{{ k.valor }}<\u002Fdiv>\n              <div style=\"font:500 10.5px 'Instrument Sans';color:#6b5c48;margin-top:6px;text-transform:uppercase;letter-spacing:.05em\">{{ k.rotulo }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div data-r=\"dash-body\" style=\"display:grid;grid-template-columns:1fr 316px;gap:22px;align-items:start\">\n          <div>\n            <!-- estrutura -->\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\">\n              <span style=\"font:600 16px 'Bitter'\">Estrutura Geral<\u002Fspan>\n              <span style=\"font:500 11px 'Instrument Sans';color:#8a7a64\">responsabilidade da organização<\u002Fspan>\n              <sc-if value=\"{{ isAdmin }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ goEstrutura }}\" style=\"margin-left:auto;border:1px solid #d8c8a8;background:#faf3e4;color:#6b5c48;font:600 11px 'Instrument Sans';padding:5px 11px;border-radius:7px;cursor:pointer\" style-hover=\"border-color:#b5502e;color:#b5502e\">Gerenciar →<\u002Fbutton><\u002Fsc-if>\n            <\u002Fdiv>\n            <div data-r=\"estr\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px\">\n              <sc-for list=\"{{ estrutura }}\" as=\"e\" hint-placeholder-count=\"6\">\n                <div style=\"background:#faf3e4;border:1px solid #e2d3b5;border-left:3px solid {{ e.cor }};border-radius:8px;padding:12px 13px\">\n                  <div style=\"font:600 13px 'Instrument Sans'\">{{ e.nome }}<\u002Fdiv>\n                  <div style=\"font:500 11.5px 'Instrument Sans';color:{{ e.cor }};margin-top:3px\">{{ e.status }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- barracas -->\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px\">\n              <span style=\"font:600 16px 'Bitter'\">Barracas<\u002Fspan>\n              <button onclick=\"{{ goBarracas }}\" style=\"border:none;background:none;color:#b5502e;font:600 12px 'Instrument Sans';cursor:pointer\">Ver todas →<\u002Fbutton>\n            <\u002Fdiv>\n            <div data-r=\"barr-dash\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:11px\">\n              <sc-for list=\"{{ barracas }}\" as=\"b\" hint-placeholder-count=\"6\">\n                <button onclick=\"{{ b.onOpen }}\" style=\"text-align:left;background:#fff;border:1px solid #e2d3b5;border-radius:9px;padding:13px 15px;display:flex;flex-direction:column;gap:9px;cursor:pointer;transition:.12s\" style-hover=\"border-color:#b5502e;box-shadow:0 6px 16px -10px rgba(46,36,28,.5)\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:8px\">\n                    <div>\n                      <div style=\"font:600 15px 'Bitter';line-height:1.1\">{{ b.nome }}<\u002Fdiv>\n                      <div style=\"font:500 11.5px 'Instrument Sans';color:#6b5c48;margin-top:3px\">{{ b.lider }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <span style=\"font:700 20px 'Bitter';color:{{ b.cor }};line-height:1\">{{ b.pctStr }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"height:6px;background:#efe3cb;border-radius:99px;overflow:hidden\"><div style=\"height:100%;width:{{ b.pctStr }};background:{{ b.cor }}\"><\u002Fdiv><\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;gap:8px\">\n                    <span style=\"font:600 10px 'Instrument Sans';text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:99px;background:{{ b.corBg }};color:{{ b.cor }}\">{{ b.sit }}<\u002Fspan>\n                    <span style=\"font:500 11px 'Instrument Sans';color:#6b5c48\">prazo {{ b.prazo }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font:400 12px/1.4 'Instrument Sans';color:#5b4d3c;border-top:1px dashed #e2d3b5;padding-top:8px\">{{ b.pend }}<\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- aside -->\n          <div style=\"display:flex;flex-direction:column;gap:16px\">\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-radius:11px;padding:17px\">\n              <div style=\"font:600 14px 'Bitter';margin-bottom:12px;display:flex;align-items:center;gap:8px\">Aguardando aprovação <span style=\"font:600 10px 'Instrument Sans';background:#b5502e;color:#fff;padding:1px 7px;border-radius:99px\">{{ nAprov }}<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:9px\">\n                <sc-for list=\"{{ aprovPreview }}\" as=\"a\" hint-placeholder-count=\"3\">\n                  <div style=\"background:#faf3e4;border:1px solid #e2d3b5;border-radius:8px;padding:10px 11px\">\n                    <div style=\"font:600 12.5px 'Instrument Sans'\">{{ a.titulo }}<\u002Fdiv>\n                    <div style=\"font:500 11px 'Instrument Sans';color:#6b5c48;margin-top:2px\">{{ a.sub }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button onclick=\"{{ goAprovacoes }}\" style=\"width:100%;margin-top:11px;border:1px solid #d8c8a8;background:#faf3e4;color:#6b5c48;font:600 12px 'Instrument Sans';padding:8px;border-radius:8px;cursor:pointer\" style-hover=\"border-color:#b5502e;color:#b5502e\">Analisar solicitações<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-radius:11px;padding:17px\">\n              <div style=\"font:600 14px 'Bitter';margin-bottom:10px\">Próximos prazos<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;font:500 12.5px 'Instrument Sans'\">\n                <sc-for list=\"{{ prazos }}\" as=\"p\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e2d3b5\"><span>{{ p.label }}<\u002Fspan><span style=\"color:{{ p.cor }}\">{{ p.data }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-radius:11px;padding:17px\">\n              <div style=\"font:600 14px 'Bitter';margin-bottom:10px\">Materiais críticos<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n                <sc-for list=\"{{ criticos }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <span style=\"font:500 11.5px 'Instrument Sans';background:{{ c.bg }};color:{{ c.cor }};padding:5px 10px;border-radius:99px\">{{ c.nome }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== DASHBOARD LÍDER (minha barraca) ===== -->\n      <sc-if value=\"{{ showDashLider }}\" hint-placeholder-val=\"{{ false }}\">\n        <div data-r=\"lider-head\" style=\"background:#2e241c;color:#f3ead7;border-radius:12px;padding:22px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center\">\n          <div>\n            <div style=\"font:500 11px 'Instrument Sans';letter-spacing:.2em;text-transform:uppercase;color:#c98a2b;margin-bottom:6px\">Minha barraca<\u002Fdiv>\n            <div style=\"font:700 26px 'Bitter';color:#fff\">{{ minhaNome }}<\u002Fdiv>\n            <div style=\"font:400 12.5px 'Instrument Sans';color:#c9b79a;margin-top:5px\">Líder: {{ userNome }} · prazo geral {{ minhaPrazo }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align:right\">\n            <div style=\"font:700 44px/1 'Bitter';color:{{ minhaCor }}\">{{ minhaPct }}<\u002Fdiv>\n            <div style=\"font:500 11px 'Instrument Sans';color:#c9b79a;margin-top:4px;text-transform:uppercase;letter-spacing:.06em\">preparação<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div data-r=\"lider-kpi\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px\">\n          <sc-for list=\"{{ liderKpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-radius:10px;padding:15px 16px\">\n              <div style=\"font:700 26px/1 'Bitter';color:{{ k.cor }}\">{{ k.valor }}<\u002Fdiv>\n              <div style=\"font:500 11px 'Instrument Sans';color:#6b5c48;margin-top:6px\">{{ k.rotulo }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#f6e9cf;border:1px solid #e6cf9c;border-radius:10px;padding:14px 16px;margin:14px 0 4px;font:500 13px 'Instrument Sans';color:#8a5a12\">\n          <strong style=\"font-weight:700\">Atenção:<\u002Fstrong> {{ minhaPend }} Use o menu ao lado para atualizar tarefas, produtos e escalas.\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== LISTA DE BARRACAS ===== -->\n      <sc-if value=\"{{ showBarracas }}\" hint-placeholder-val=\"{{ false }}\">\n        <div data-r=\"barr-list\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px\">\n          <sc-for list=\"{{ barracas }}\" as=\"b\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ b.onOpen }}\" style=\"text-align:left;background:#f3ead7;border:1px solid #d8c8a8;border-top:4px solid {{ b.cor }};border-radius:10px;padding:17px 18px;cursor:pointer;display:flex;flex-direction:column;gap:12px;transition:.12s\" style-hover=\"box-shadow:0 10px 22px -12px rgba(46,36,28,.5);transform:translateY(-2px)\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n                <div>\n                  <div style=\"font:700 18px 'Bitter';line-height:1.05\">{{ b.nome }}<\u002Fdiv>\n                  <div style=\"font:500 12px 'Instrument Sans';color:#6b5c48;margin-top:4px\">{{ b.lider }}<\u002Fdiv>\n                <\u002Fdiv>\n                <span style=\"font:600 10px 'Instrument Sans';text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;border-radius:99px;background:{{ b.corBg }};color:{{ b.cor }}\">{{ b.sit }}<\u002Fspan>\n              <\u002Fdiv>\n              <div>\n                <div style=\"display:flex;justify-content:space-between;font:600 12px 'Instrument Sans';color:#6b5c48;margin-bottom:5px\"><span>Preparação<\u002Fspan><span style=\"color:{{ b.cor }}\">{{ b.pctStr }}<\u002Fspan><\u002Fdiv>\n                <div style=\"height:7px;background:#e2d3b5;border-radius:99px;overflow:hidden\"><div style=\"height:100%;width:{{ b.pctStr }};background:{{ b.cor }}\"><\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:14px;font:500 11.5px 'Instrument Sans';color:#6b5c48;border-top:1px dashed #d8c8a8;padding-top:10px\">\n                <span>{{ b.nTarefas }} tarefas<\u002Fspan><span>{{ b.nVol }} voluntários<\u002Fspan><span>prazo {{ b.prazo }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== DETALHE DA BARRACA ===== -->\n      <sc-if value=\"{{ showBarraca }}\" hint-placeholder-val=\"{{ false }}\">\n        <button onclick=\"{{ backToBarracas }}\" style=\"border:none;background:none;color:#8a7a64;font:600 12.5px 'Instrument Sans';cursor:pointer;margin-bottom:14px;padding:0\" style-hover=\"color:#b5502e\">‹ Voltar para barracas<\u002Fbutton>\n        <div data-r=\"det-head\" style=\"background:#f3ead7;border:1px solid #d8c8a8;border-radius:12px;padding:22px 24px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:11px\">\n              <span style=\"font:700 26px 'Bitter'\">{{ det.nome }}<\u002Fspan>\n              <span style=\"font:600 10px 'Instrument Sans';text-transform:uppercase;letter-spacing:.04em;padding:4px 11px;border-radius:99px;background:{{ det.corBg }};color:{{        <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- materiais + infra -->\n          <div style=\"display:flex;flex-direction:column;gap:16px\">\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-radius:11px;padding:17px 18px\">\n              <div style=\"font:600 15px 'Bitter';margin-bottom:12px\">Materiais &amp; equipamentos<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:7px\">\n                <sc-for list=\"{{ det.materiais }}\" as=\"m\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;gap:9px;font:500 12.5px 'Instrument Sans'\">\n                    <span style=\"width:7px;height:7px;border-radius:99px;background:{{ m.cor }};flex:none\"><\u002Fspan>\n                    <span style=\"flex:1\">{{ m.nome }}<\u002Fspan>\n                    <span style=\"color:#8a7a64;font-size:11.5px\">{{ m.origem }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-radius:11px;padding:17px 18px\">\n              <div style=\"font:600 15px 'Bitter';margin-bottom:12px\">Infraestrutura<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n                <sc-for list=\"{{ det.infra }}\" as=\"i\" hint-placeholder-count=\"3\">\n                  <span style=\"font:500 11.5px 'Instrument Sans';background:{{ i.bg }};color:{{ i.cor }};padding:5px 11px;border-radius:99px\">{{ i.nome }} · {{ i.status }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== TAREFAS ===== -->\n      <sc-if value=\"{{ showTarefas }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap\">\n r-spacing:.05em;color:#8a7a64\">{{ c.k }}<\u002Fdiv>\n                    <div style=\"font:600 14px 'Bitter';margin-top:4px;color:#2e241c\">{{ c.v }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== VOLUNTÁRIOS & ESCALAS ===== -->\n      <sc-if value=\"{{ showVoluntarios }}\" hint-placeholder-val=\"{{ false }}\">\n        <div data-r=\"vol-kpi\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px\">\n          <sc-for list=\"{{ volKpis }}\" as=\"k\" hint-placeholder-count=\"3\">\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-left:3px solid {{ k.cor }};border-radius:10px;padding:14px 16px\">\n              <div style=\"font:700 24px/1 'Bitter';color:{{ k.cor }}\">{{ k.valor }}<\u002Fdiv>\n              <div style=\"font:500 11.5px 'Instrument Sans';color:#6b5c48;margin-top:5px\">{{ k.rotulo }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div data-r=\"tblwrap\"><div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-radius:11px;overflow:hidden;min-width:820px\">\n          <div style=\"display:grid;grid-template-columns:1fr 130px 120px 150px 120px;padding:11px 18px;background:#efe3cb;border-bottom:1px solid #d8c8a8;font:600 10.5px 'Instrument Sans';text-transform:uppercase;letter-spacing:.05em;color:#8a7a64\">\n            <span>Voluntário<\u002Fspan><span>Barraca<\u002Fspan><span>Função<\u002Fspan><span>Turno / horário<\u002Fspan><span>Confirmação<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ voluntariosView }}\" as=\"v\" hint-placeholder-count=\"6\">\n            <div style=\"display:grid;grid-template-columns:1fr 130px 120px 150px 120px;align-items:center;padding:12px 18px;border-bottom:1px solid #e6dac2;background:{{ v.rowBg }}\">\n              <span style=\"display:flex;align-items:center;gap:10px\">\n                <span style=\"width:30px;height:30px;flex:none;border-radius:99px;background:{{ v.avaCor }};color:#fff;display:flex;align-items:center;justify-content:center;font:700 11px 'Bitter'\">{{ v.ini }}<\u002Fspan>\n                <span style=\"font:600 13px 'Instrument Sans'\">{{ v.nome }}<\u002Fspan>\n              <\u002Fspan>\n              <span style=\"font:500 12px 'Instrument Sans';color:#5b4d3c\">{{ v.barracaNome }}<\u002Fspan>\n              <span style=\"font:500 12px 'Instrument Sans';color:#5b4d3c\">{{ v.funcao }}<\u002Fspan>\n              <span style=\"font:500 12px 'Instrument Sans';color:#5b4d3c\">{{ v.turno }} · {{ v.horario }}<\u002Fspan>\n              <span><span style=\"font:600 10.5px 'Instrument Sans';padding:4px 10px;border-radius:99px;background:{{ v.confBg }};color:{{ v.confCor }}\">{{ v.conf }}<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== APROVAÇÕES ===== -->\n      <sc-if value=\"{{ showAprovacoes }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:12px;max-width:820px\">\n          <sc-for list=\"{{ aprovacoesView }}\" as=\"a\" hint-placeholder-count=\"4\">\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-left:4px solid {{ a.cor }};border-radius:11px;padding:17px 19px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:16px\">\n                <div style=\"flex:1\">\n                  <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:5px\">\n                    <span style=\"font:700 16px 'Bitter'\">{{ a.titulo }}<\u002Fspan>\n                    <span style=\"font:600 9.5px 'Instrument Sans';text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:99px;background:{{ a.tipoBg }};color:{{ a.tipoCor }}\">{{ a.tipoLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font:400 12.5px/1.5 'Instrument Sans';color:#6b5c48\">{{ a.sub }} · Item: {{ a.item }} · Contato por {{ a.resp }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"text-align:right;flex:none\">\n                  <span style=\"font:600 10.5px 'Instrument Sans';text-transform:uppercase;letter-spacing:.03em;padding:4px 11px;border-radius:99px;background:{{ a.statusBg }};color:{{ a.statusCor }}\">{{ a.statusLabel }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ a.podeDecidir }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;gap:9px;margin-top:14px\">\n                  <button onclick=\"{{ a.onAprovar }}\" style=\"border:none;background:#5f7a3f;color:#fff;font:600 12.5px 'Instrument Sans';padding:8px 16px;border-radius:8px;cursor:pointer\" style-hover=\"background:#516a34\">Aprovar<\u002Fbutton>\n                  <button onclick=\"{{ a.onReprovar }}\" style=\"border:1px solid #cdaea0;background:#faf3e4;color:#9e3b2a;font:600 12.5px 'Instrument Sans';padding:8px 16px;border-radius:8px;cursor:pointer\" style-hover=\"background:#f4ddd2\">Reprovar<\u002Fbutton>\n                  <button onclick=\"{{ a.onInfo }}\" style=\"border:1px solid #d8c8a8;background:#faf3e4;color:#8a5a12;font:600 12.5px 'Instrument Sans';padding:8px 16px;border-radius:8px;cursor:pointer\" style-hover=\"background:#f6e9cf\">Pedir informações<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== ESTRUTURA (admin) ===== -->\n      <sc-if value=\"{{ showEstrutura }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#f6e9cf;border:1px solid #e6cf9c;border-radius:10px;padding:13px 16px;margin-bottom:16px;font:500 12.5px 'Instrument Sans';color:#8a5a12\">A estrutura geral é da organização — não das barracas. Clique numa situação para avançar o andamento.<\u002Fdiv>\n        <div data-r=\"estr-view\" style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:900px\">\n          <sc-for list=\"{{ estruturaView }}\" as=\"e\" hint-placeholder-count=\"6\">\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-left:4px solid {{ e.cor }};border-radius:10px;padding:15px 17px;display:flex;justify-content:space-between;align-items:center\">\n              <div>\n                <div style=\"font:600 15px 'Bitter'\">{{ e.nome }}<\u002Fdiv>\n                <div style=\"font:400 12px 'Instrument Sans';color:#6b5c48;margin-top:3px\">{{ e.desc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ e.onCycle }}\" style=\"border:none;font:600 11px 'Instrument Sans';padding:6px 13px;border-radius:99px;background:{{ e.bg }};color:{{ e.cor }};cursor:pointer\">{{ e.status }}<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== CHECKLIST ===== -->\n      <sc-if value=\"{{ showChecklist }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px\">\n          <div style=\"flex:1;max-width:420px\">\n            <div style=\"display:flex;justify-content:space-between;font:600 12.5px 'Instrument Sans';color:#6b5c48;margin-bottom:6px\"><span>Progresso do checklist do evento<\u002Fspan><span style=\"color:#b5502e\">{{ chkPct }}<\u002Fspan><\u002Fdiv>\n            <div style=\"height:9px;background:#e2d3b5;border-radius:99px;overflow:hidden\"><div style=\"height:100%;width:{{ chkPct }};background:#5f7a3f;transition:width .3s\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font:500 12px 'Instrument Sans';color:#8a7a64\">{{ chkDone }} de {{ chkTotal }} itens concluídos<\u002Fspan>\n        <\u002Fdiv>\n        <div data-r=\"chk\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start\">\n          <sc-for list=\"{{ checklistView }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"background:#f3ead7;border:1px solid #d8c8a8;border-radius:11px;padding:16px 18px\">\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:12px\">\n                <span style=\"width:8px;height:8px;border-radius:99px;background:{{ s.cor }}\"><\u002Fspan>\n                <span style=\"font:600 15px 'Bitter'\">{{ s.titulo }}<\u002Fspan>\n                <span style=\"margin-left:auto;font:500 11px 'Instrument Sans';color:#8a7a64\">{{ s.progresso }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:2px\">\n                <sc-for list=\"{{ s.itens }}\" as=\"it\" hint-placeholder-count=\"4\">\n                  <button onclick=\"{{ it.onToggle }}\" style=\"display:flex;align-items:center;gap:11px;width:100%;text-align:left;border:none;background:none;padding:8px 6px;border-radius:7px;cursor:pointer;font-family:'Instrument Sans'\" style-hover=\"background:#faf3e4\">\n                    <span style=\"width:19px;height:19px;flex:none;border-radius:6px;border:2px solid {{ it.boxBorda }};background:{{ it.boxBg }};display:flex;align-items:center;justify-content:center;color:#fff;font:700 12px 'Instrument Sans'\">{{ it.check }}<\u002Fspan>\n                    <span style=\"font:500 13px 'Instrument Sans';color:{{ it.cor }};text-decoration:{{ it.deco }}\">{{ it.label }}<\u002Fspan>\n                  <\u002Fbutton>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1320,&quot;height&quot;:880}}\">\nclass Component extends DCLogic {\n  state = {\n    logged: false,\n    role: 'admin',      // admin | lider | pastoral\n    liderId: 'comida',  // barraca escopo do líder\n    screen: 'dashboard',\n    selBarraca: 'comida',\n    taskFilter: 'todas',\n    taskStatus: {},     // id -> situação (override)\n    aprovDecisao: {},   // id -> aprovada|reprovada|info\n    estruturaStatus: {},// id -> status idx\n    chkDone: {},        // \"s-i\" -> true\n  };\n\n  // ---------- referência estática ----------\n  SIT = {\n    'pronta':        { cor:'#5f7a3f', bg:'#e7edda' },\n    'em andamento':  { cor:'#c98a2b', bg:'#f6e9cf' },\n    'com pendências':{ cor:'#b5502e', bg:'#f4ddd2' },\n    'bloqueada':     { cor:'#9e3b2a', bg:'#f2d6cf' },\n  };\n  TSIT = {\n    'não iniciada':      { cor:'#8a7a64', bg:'#eadfc9' },\n    'em andamento':      { cor:'#c98a2b', bg:'#f6e9cf' },\n    'aguardando resposta':{ cor:'#6b5c48', bg:'#e6dac2' },\n    'bloqueada':         { cor:'#9e3b2a', bg:'#f2d6cf' },\n    'atrasada':          { cor:'#b5502e', bg:'#f4ddd2' },\n    'concluída':         { cor:'#5f7a3f', bg:'#e7edda' },\n  };\n  PRIO = { 'normal':'#8a7a64', 'importante':'#c98a2b', 'crítica':'#9e3b2a' };\n  CYCLE = ['não iniciada','em andamento','aguardando resposta','concluída'];\n\n  barracasDef() {\n    return [\n      { id:'caldos',     nome:'Caldos',                lider:'Dona Cida',    pct:85,  sit:'em andamento',   prazo:'17 jul', pend:'Confirmar 2 voluntários do turno da noite.' },\n      { id:'milho',      nome:'Milho',                 lider:'Seu Antônio',  pct:60,  sit:'em andamento',   prazo:'12 jul', pend:'Definir quantidades de pamonha, curau e milho cozido.' },\n      { id:'doces',      nome:'Doces',                 lider:'Marta Alves',  pct:90,  sit:'pronta',         prazo:'22 jul', pend:'Aguardando aprovação da doação da padaria.' },\n      { id:'refri',      nome:'Refrigerantes',         lider:'Paulo Reis',   pct:100, sit:'pronta',         prazo:'—',      pend:'Tudo confirmado. Patrocínio garantido.' },\n      { id:'comida',     nome:'Comida — Maria Isabel', lider:'Maria Isabel', pct:45,  sit:'com pendências', prazo:'08 jul', pend:'Orçamento de ingredientes atrasado (tarefa crítica).' },\n      { id:'espetinhos', nome:'Espetinhos',            lider:'Roberto Lima', pct:30,  sit:'bloqueada',      prazo:'12 jul', pend:'Aguardando churrasqueira e ponto de gás.' },\n      { id:'brinquedos', nome:'Brinquedos',            lider:'Júlia Souza',  pct:70,  sit:'em andamento',   prazo:'17 jul', pend:'Falta providenciar extensão e tomada.' },\n    ];\n  }\n  barNome(id){ const b=this.barracasDef().find(x=>x.id===id); return b?b.nome:''; }\n\n  tarefasDef() {\n    return [\n      { id:'t1',  titulo:'Fechar orçamento de ingredientes', barraca:'comida',     cat:'Compras',      resp:'Maria Isabel', prazo:'02 jul', prio:'crítica',    sit:'atrasada' },\n      { id:'t2',  titulo:'Definir cardápio final',           barraca:'comida',     cat:'Planejamento', resp:'Maria Isabel', prazo:'08 jul', prio:'importante', sit:'em andamento' },\n      { id:'t3',  titulo:'Providenciar churrasqueira',       barraca:'espetinhos', cat:'Equipamentos', resp:'Roberto Lima', prazo:'05 jul', prio:'crítica',    sit:'bloqueada' },\n      { id:'t4',  titulo:'Confirmar ponto de gás',           barraca:'espetinhos', cat:'Infraestrutura',resp:'Organização', prazo:'06 jul', prio:'crítica',    sit:'aguardando resposta' },\n      { id:'t5',  titulo:'Comprar espetos e carvão',         barraca:'espetinhos', cat:'Compras',      resp:'Roberto Lima', prazo:'20 jul', prio:'normal',     sit:'não iniciada' },\n      { id:'t6',  titulo:'Definir quantidades de milho',     barraca:'milho',      cat:'Planejamento', resp:'Seu Antônio',  prazo:'12 jul', prio:'importante', sit:'em andamento' },\n      { id:'t7',  titulo:'Testar receita da pamonha',        barraca:'milho',      cat:'Produção',     resp:'Dona Lurdes',  prazo:'25 jul', prio:'normal',     sit:'não iniciada' },\n      { id:'t8',  titulo:'Escala do turno da noite',         barraca:'caldos',     cat:'Voluntários',  resp:'Dona Cida',    prazo:'17 jul', prio:'importante', sit:'em andamento' },\n      { id:'t9',  titulo:'Comprar potes descartáveis',       barraca:'caldos',     cat:'Descartáveis', resp:'Dona Cida',    prazo:'22 jul', prio:'normal',     sit:'não iniciada' },\n      { id:'t10', titulo:'Confirmar doação da padaria',      barraca:'doces',      cat:'Doações',      resp:'Marta Alves',  prazo:'10 jul', prio:'importante', sit:'aguardando resposta' },\n      { id:'t11', titulo:'Providenciar extensão e tomada',   barraca:'brinquedos', cat:'Infraestrutura',resp:'Júlia Souza', prazo:'17 jul', prio:'importante', sit:'em andamento' },\n      { id:'t12', titulo:'Fechar patrocínio de refrigerante',barraca:'refri',      cat:'Doações',      resp:'Paulo Reis',   prazo:'01 jul', prio:'normal',     sit:'concluída' },\n    ];\n  }\n  taskSit(t){ return this.state.taskStatus[t.id] || t.sit; }\n\n  produtosDef() {\n    return [\n      { id:'p1', nome:'Pamonha',      barraca:'Milho',              resp:'Dona Lurdes', desc:'Doce, na palha',\n        campos:{ 'Planejado':'120 un', 'Porções':'120', 'Fichas':'3 fichas', 'Produção':'06 ago', 'Local':'Cozinha da igreja' } },\n      { id:'p2', nome:'Curau',        barraca:'Milho',              resp:'Seu Antônio', desc:'Copo 200ml',\n        campos:{ 'Planejado':'80 copos', 'Porções':'80', 'Fichas':'2 fichas', 'Produção':'06 ago', 'Local':'Cozinha da igreja' } },\n      { id:'p3', nome:'Milho cozido', barraca:'Milho',              resp:'Seu Antônio', desc:'Espiga na manteiga',\n        campos:{ 'Planejado':'150 un', 'Porções':'150', 'Fichas':'2 fichas', 'Produção':'07 ago', 'Local':'Barraca' } },\n      { id:'p4', nome:'Feijão tropeiro',barraca:'Comida — Maria Isabel', resp:'Maria Isabel', desc:'Prato principal',\n        campos:{ 'Planejado':'8 kg', 'Porções':'160', 'Fichas':'4 fichas', 'Produção':'07 ago', 'Local':'Cozinha da igreja' } },\n    ];\n  }\n  voluntariosDef() {\n    return [\n      { id:'v1', nome:'Ana Paula',   barraca:'caldos',     funcao:'Cozinha',    turno:'Noite', horario:'18h–22h', conf:'confirmado' },\n      { id:'v2', nome:'Carlos Nunes',barraca:'caldos',     funcao:'Atendimento',turno:'Noite', horario:'18h–22h', conf:'pendente' },\n      { id:'v3', nome:'Fernanda Sá', barraca:'milho',      funcao:'Produção',   turno:'Tarde', horario:'15h–19h', conf:'confirmado' },\n      { id:'v4', nome:'Beto Ramos',  barraca:'espetinhos', funcao:'Churrasco',  turno:'Noite', horario:'18h–23h', conf:'pendente' },\n      { id:'v5', nome:'Lúcia Prado', barraca:'comida',     funcao:'Cozinha',    turno:'Tarde', horario:'14h–18h', conf:'confirmado' },\n      { id:'v6', nome:'Tiago Melo',  barraca:'comida',     funcao:'Atendimento',turno:'Noite', horario:'18h–22h', conf:'pendente' },\n      { id:'v7', nome:'Rita Campos', barraca:'brinquedos', funcao:'Monitoria',  turno:'Integral', horario:'14h–22h', conf:'confirmado' },\n      { id:'v8', nome:'Sônia Dias',  barraca:'doces',      funcao:'Atendimento',turno:'Noite', horario:'18h–22h', conf:'confirmado' },\n    ];\n  }\n  aprovacoesDef() {\n    return [\n      { id:'a1', titulo:'Doação — Padaria do Zé',      sub:'Barraca dos Doces', tipo:'interno', item:'Fôrmas e caixas de doce', resp:'Marta Alves' },\n      { id:'a2', titulo:'Patrocínio — Mercado Central', sub:'Refrigerantes',     tipo:'externo', item:'20 caixas de refrigerante', resp:'Paulo Reis' },\n      { id:'a3', titulo:'Oferta de utensílios',         sub:'Barraca de Caldos', tipo:'interno', item:'2 panelas grandes',        resp:'Dona Cida' },\n      { id:'a4', titulo:'Empréstimo de freezer',        sub:'Comida — Maria Isabel', tipo:'interno', item:'Freezer horizontal', resp:'Maria Isabel' },\n    ];\n  }\n  estruturaDef() {\n    return [\n      { id:'e1', nome:'Tendas & barracas',    desc:'Montagem das 7 estruturas', status:'Confirmado' },\n      { id:'e2', nome:'Iluminação & tomadas', desc:'Pontos de energia no pátio', status:'Faltam 3 pontos' },\n      { id:'e3', nome:'Mesas & cadeiras',     desc:'Área de convivência',        status:'Orçamento em análise' },\n      { id:'e4', nome:'Sistema de fichas',    desc:'Operação financeira',        status:'Confirmado' },\n      { id:'e5', nome:'Caixa central',        desc:'Equipe e estrutura',         status:'Confirmado' },\n      { id:'e6', nome:'Descarte de lixo',     desc:'Coleta e sacos',             status:'Sem responsável' },\n    ];\n  }\n  ESTR = {\n    'Confirmado':          { cor:'#5f7a3f', bg:'#e7edda' },\n    'Em análise':          { cor:'#c98a2b', bg:'#f6e9cf' },\n    'Orçamento em análise':{ cor:'#c98a2b', bg:'#f6e9cf' },\n    'Faltam 3 pontos':     { cor:'#c98a2b', bg:'#f6e9cf' },\n    'Sem responsável':     { cor:'#9e3b2a', bg:'#f2d6cf' },\n  };\n  ESTR_CYCLE = ['Sem responsável','Em análise','Confirmado'];\n\n  checklistDef() {\n    return [\n      { id:'c1', titulo:'Preparação (antes da abertura)', cor:'#c98a2b', itens:['Barracas montadas e limpas','Produtos e ingredientes conferidos','Voluntários presentes e escalados','Fichas e caixa prontos'] },\n      { id:'c2', titulo:'Durante a festa',                cor:'#5f7a3f', itens:['Reposição de produtos','Controle de fichas por barraca','Registro de ocorrências','Apoio a barracas com fila'] },\n      { id:'c3', titulo:'Encerramento & desmontagem',     cor:'#b5502e', itens:['Contagem final de fichas','Limpeza das barracas','Desmontagem das estruturas','Descarte de lixo'] },\n      { id:'c4', titulo:'Devolução de materiais',         cor:'#9e3b2a', itens:['Devolver freezer emprestado','Devolver panelas e utensílios','Confirmar condição dos itens','Registrar perdas'] },\n    ];\n  }\n\n  // ---------- handlers ----------\n  login(role){ this.setState({ logged:true, role, screen: role==='lider'?'lider':'dashboard' }); }\n  logout(){ this.setState({ logged:false }); }\n  setRole(role){ this.setState({ role, screen: role==='lider'?'lider':'dashboard', selBarraca:'comida' }); }\n  go(screen){ this.setState({ screen }); }\n  openBarraca(id){ this.setState({ selBarraca:id, screen:'barraca' }); }\n  setFilter(f){ this.setState({ taskFilter:f }); }\n  cycleTask(id){\n    const cur = this.state.taskStatus[id] || this.tarefasDef().find(t=>t.id===id).sit;\n    let idx = this.CYCLE.indexOf(cur);\n    const next = this.CYCLE[(idx+1) % this.CYCLE.length];\n    this.setState(s => ({ taskStatus: { ...s.taskStatus, [id]: next } }));\n  }\n  decide(id, d){ this.setState(s => ({ aprovDecisao: { ...s.aprovDecisao, [id]: d } })); }\n  cycleEstr(id){\n    const def = this.estruturaDef().find(e=>e.id===id);\n    const cur = this.state.estruturaStatus[id] || def.status;\n    const norm = this.ESTR_CYCLE.includes(cur) ? cur : (this.ESTR[cur] && this.ESTR[cur].cor==='#5f7a3f' ? 'Confirmado' : 'Em análise');\n    let idx = this.ESTR_CYCLE.indexOf(norm);\n    const next = this.ESTR_CYCLE[(idx+1) % this.ESTR_CYCLE.length];\n    this.setState(s => ({ estruturaStatus: { ...s.estruturaStatus, [id]: next } }));\n  }\n  toggleChk(key){ this.setState(s => ({ chkDone: { ...s.chkDone, [key]: !s.chkDone[key] } })); }\n\n  // ---------- render ----------\n  renderVals(){\n    const S = this.state;\n    const isAdmin = S.role==='admin', isLider = S.role==='lider', isPastoral = S.role==='pastoral';\n    const barrDef = this.barracasDef();\n\n    // usuário\n    const userMap = {\n      admin:    { nome:'Larissa Nobre', papel:'Administradora', ini:'LN', cor:'#b5502e' },\n      lider:    { nome:'Maria Isabel',  papel:'Líder de barraca', ini:'MI', cor:'#c98a2b' },\n      pastoral: { nome:'Pr. Ângelo',    papel:'Visualizador pastoral', ini:'PA', cor:'#6f7a4e' },\n    };\n    const u = userMap[S.role];\n\n    // barracas (escopo)\n    const scope = isLider ? barrDef.filter(b=>b.id===S.liderId) : barrDef;\n    const barracas = scope.map(b => ({\n      ...b, pctStr:b.pct+'%', cor:this.SIT[b.sit].cor, corBg:this.SIT[b.sit].bg,\n      nTarefas: this.tarefasDef().filter(t=>t.barraca===b.id).length,\n      nVol: this.voluntariosDef().filter(v=>v.barraca===b.id).length,\n      onOpen: () => this.openBarraca(b.id),\n    }));\n\n    // nav\n    const cur = S.screen;\n    const navStyle = (active) => `display:flex;align-items:center;gap:10px;border:none;border-radius:9px;padding:10px 12px;cursor:pointer;font:${active?'600':'500'} 13px 'Instrument Sans';background:${active?'#b5502e':'transparent'};color:${active?'#fff':'#c9b79a'};transition:.1s`;\n    const nAprovPend = this.aprovacoesDef().filter(a=>!S.aprovDecisao[a.id]).length;\n    let navDef;\n    if (isLider) {\n      navDef = [\n        { key:'lider', label:'Minha barraca' },\n        { key:'tarefas', label:'Tarefas' },\n        { key:'produtos', label:'Produtos' },\n        { key:'voluntarios', label:'Voluntários' },\n        { key:'aprovacoes', label:'Solicitações', badge:nAprovPend },\n        { key:'checklist', label:'Checklist' },\n      ];\n    } else if (isPastoral) {\n      navDef = [\n        { key:'dashboard', label:'Visão geral' },\n        { key:'aprovacoes', label:'Aprovações', badge:nAprovPend },\n        { key:'barracas', label:'Barracas' },\n        { key:'checklist', label:'Checklist' },\n      ];\n    } else {\n      navDef = [\n        { key:'dashboard', label:'Dashboard' },\n        { key:'barracas', label:'Barracas' },\n        { key:'tarefas', label:'Tarefas' },\n        { key:'produtos', label:'Produtos' },\n        { key:'voluntarios', label:'Voluntários' },\n        { key:'aprovacoes', label:'Aprovações', badge:nAprovPend },\n        { key:'estrutura', label:'Estrutura geral' },\n        { key:'checklist', label:'Checklist' },\n      ];\n    }\n    const activeKey = (cur==='barraca') ? 'barracas' : cur;\n    const navItems = navDef.map(n => ({\n      label:n.label, badge:n.badge||0,\n      style: navStyle(n.key===activeKey),\n      dot: n.key===activeKey ? '#f7d9c0' : 'rgba(255,255,255,.28)',\n      onClick: () => this.go(n.key),\n    }));\n\n    // roleTabs\n    const rt = [ ['admin','Admin'], ['lider','Líder'], ['pastoral','Pastoral'] ];\n    const roleTabs = rt.map(([k,l]) => ({\n      label:l,\n      style:`border:none;padding:7px 13px;cursor:pointer;background:${S.role===k?'#2e241c':'#f3ead7'};color:${S.role===k?'#f3ead7':'#6b5c48'};font:600 12px 'Instrument Sans'`,\n      onClick: () => this.setRole(k),\n    }));\n\n    // títulos por tela\n    const titles = {\n      dashboard:['Painel da organização','preparação geral do evento'],\n      lider:['Minha barraca','acompanhe e atualize suas demandas'],\n      barracas:['Barracas','7 barracas · líder e preparação'],\n      barraca:[this.barNome(S.selBarraca),'detalhes da barraca'],\n      tarefas:['Gestão de tarefas','responsável, prazo e prioridade'],\n      produtos:['Planejamento de produtos','quantidades, porções e produção'],\n      voluntarios:['Voluntários & escalas','turnos, funções e confirmações'],\n      aprovacoes:['Solicitações & aprovações','doações, ofertas e patrocínios'],\n      estrutura:['Estrutura geral','responsabilidade da organização'],\n      checklist:['Checklist do evento','preparação, festa, desmontagem e devolução'],\n    };\n    const [pageTitle, pageSub] = titles[cur] || titles.dashboard;\n\n    // dashboard admin data\n    const kpis = [\n      { valor:'68%', rotulo:'Preparação geral', cor:'#2e241c' },\n      { valor:'7',   rotulo:'Barracas',         cor:'#2e241c' },\n      { valor:'2',   rotulo:'Prontas',          cor:'#5f7a3f' },\n      { valor:'4',   rotulo:'Com pendências',   cor:'#b5502e' },\n      { valor:'1',   rotulo:'Bloqueada',        cor:'#9e3b2a' },\n      { valor:'3',   rotulo:'Tarefas atrasadas',cor:'#9e3b2a' },\n    ];\n    const estrStatus = (e) => this.state.estruturaStatus[e.id] || e.status;\n    const estrutura = this.estruturaDef().map(e => {\n      const st = estrStatus(e); const c = this.ESTR[st] || this.ESTR['Em análise'];\n      return { nome:e.nome, status:st, cor:c.cor };\n    });\n    const estruturaView = this.estruturaDef().map(e => {\n      const st = estrStatus(e); const c = this.ESTR[st] || this.ESTR['Em análise'];\n      return { nome:e.nome, desc:e.desc, status:st, cor:c.cor, bg:c.bg, onCycle:()=>this.cycleEstr(e.id) };\n    });\n    const aprovPreview = this.aprovacoesDef().filter(a=>!S.aprovDecisao[a.id]).slice(0,3).map(a=>({ titulo:a.titulo, sub:a.sub+' · '+a.item }));\n    const prazos = [\n      { label:'Cardápio inicial',       data:'08 jul', cor:'#9e3b2a' },\n      { label:'Listas de materiais',    data:'12 jul', cor:'#b5502e' },\n      { label:'Escalas de voluntários', data:'17 jul', cor:'#6b5c48' },\n      { label:'Ofertas e patrocínios',  data:'22 jul', cor:'#6b5c48' },\n    ];\n    const criticos = [\n      { nome:'Churrasqueira', cor:'#9e3b2a', bg:'#f4dcd3' },\n      { nome:'Botijão de gás',cor:'#9e3b2a', bg:'#f4dcd3' },\n      { nome:'Extensões',     cor:'#a2701c', bg:'#f6e6cf' },\n      { nome:'Freezer',       cor:'#a2701c', bg:'#f6e6cf' },\n    ];\n\n    // dashboard líder\n    const mb = barrDef.find(b=>b.id===S.liderId);\n    const mbTasks = this.tarefasDef().filter(t=>t.barraca===S.liderId);\n    const nAtras = mbTasks.filter(t=>this.taskSit(t)==='atrasada').length;\n    const nConc = mbTasks.filter(t=>this.taskSit(t)==='concluída').length;\n    const liderKpis = [\n      { valor:mbTasks.length, rotulo:'Tarefas', cor:'#2e241c' },\n      { valor:nConc, rotulo:'Concluídas', cor:'#5f7a3f' },\n      { valor:nAtras, rotulo:'Atrasadas', cor:'#9e3b2a' },\n      { valor:this.voluntariosDef().filter(v=>v.barraca===S.liderId).length, rotulo:'Voluntários', cor:'#c98a2b' },\n    ];\n\n    // tarefas view\n    const filters = [\n      { k:'todas', l:'Todas' }, { k:'atrasada', l:'Atrasadas' },\n      { k:'crítica', l:'Críticas' }, { k:'em andamento', l:'Em andamento' }, { k:'concluída', l:'Concluídas' },\n    ];\n    let taskPool = this.tarefasDef();\n    if (isLider) taskPool = taskPool.filter(t=>t.barraca===S.liderId);\n    const matchFilter = (t, f) => {\n      const st = this.taskSit(t);\n      if (f==='todas') return true;\n      if (f==='crítica') return t.prio==='crítica';\n      return st===f;\n    };\n    const taskFilters = filters.map(f => ({\n      label:f.l, count: taskPool.filter(t=>matchFilter(t,f.k)).length,\n      style:`border:1px solid ${S.taskFilter===f.k?'#b5502e':'#d8c8a8'};background:${S.taskFilter===f.k?'#b5502e':'#f3ead7'};color:${S.taskFilter===f.k?'#fff':'#6b5c48'};font:600 12.5px 'Instrument Sans';padding:7px 14px;border-radius:8px;cursor:pointer`,\n      onClick: () => this.setFilter(f.k),\n    }));\n    const tarefasView = taskPool.filter(t=>matchFilter(t,S.taskFilter)).map(t => {\n      const st = this.taskSit(t); const c = this.TSIT[st];\n      const atras = st==='atrasada';\n      return {\n        titulo:t.titulo, cat:t.cat, prio:t.prio, resp:t.resp, prazo:t.prazo,\n        barracaNome:this.barNome(t.barraca),\n        prioCor:this.PRIO[t.prio], sit:st, sitCor:c.cor, sitBg:c.bg,\n        prazoCor: atras?'#b5502e':'#5b4d3c',\n        rowBg: atras?'#f9 eee7':'#f3ead7', // guarded below\n        onCycle: () => this.cycleTask(t.id),\n      };\n    }).map(x => ({ ...x, rowBg: x.sit==='atrasada' ? '#faeae2' : '#f3ead7' }));\n\n    // detalhe barraca\n    const db = barrDef.find(b=>b.id===S.selBarraca) || barrDef[0];\n    const detProdutos = this.produtosDef().filter(p => p.barraca.startsWith(this.barNome(S.selBarraca).split(' ')[0])).map(p=>{\n      const cv = Object.entries(p.campos);\n      return { nome:p.nome, qtd:cv[0][1], info: p.desc + ' · ' + cv[3][0]+' '+cv[3][1] };\n    });\n    const detTarefas = this.tarefasDef().filter(t=>t.barraca===S.selBarraca).map(t=>{\n      const st=this.taskSit(t); const c=this.TSIT[st];\n      return { titulo:t.titulo, prioCor:this.PRIO[t.prio], sit:st, sitCor:c.cor, sitBg:c.bg };\n    });\n    const CONF = { 'confirmado':{cor:'#5f7a3f',bg:'#e7edda'}, 'pendente':{cor:'#c98a2b',bg:'#f6e9cf'} };\n    const ini = (nome) => nome.split(' ').map(w=>w[0]).slice(0,2).join('');\n    const detVol = this.voluntariosDef().filter(v=>v.barraca===S.selBarraca).map(v=>({\n      nome:v.nome, funcao:v.funcao, turno:v.turno, ini:ini(v.nome),\n      conf:v.conf, confCor:CONF[v.conf].cor, confBg:CONF[v.conf].bg,\n    }));\n    const detMateriais = [\n      { nome:'Panelas grandes', origem:'da barraca', cor:'#5f7a3f' },\n      { nome:'Botijão de gás', origem:'a providenciar', cor:'#9e3b2a' },\n      { nome:'Descartáveis', origem:'organização', cor:'#c98a2b' },\n    ];\n    const detInfra = [\n      { nome:'Energia', status:'atendida', bg:'#e7edda', cor:'#5f7a3f' },\n      { nome:'Mesa', status:'em análise', bg:'#f6e9cf', cor:'#a2701c' },\n      { nome:'Água', status:'atendida', bg:'#e7edda', cor:'#5f7a3f' },\n    ];\n    const det = { nome:db.nome, lider:db.lider, prazo:db.prazo, sit:db.sit, cor:this.SIT[db.sit].cor, corBg:this.SIT[db.sit].bg, pctStr:db.pct+'%',\n      produtos:detProdutos, tarefas:detTarefas, voluntarios:detVol, materiais:detMateriais, infra:detInfra };\n\n    // produtos view\n    let prodPool = this.produtosDef();\n    if (isLider) prodPool = prodPool.filter(p => p.barraca.startsWith(this.barNome(S.liderId).split(' ')[0]));\n    const produtosView = prodPool.map(p => ({\n      nome:p.nome, desc:p.desc, barraca:p.barraca, resp:p.resp,\n      campos: Object.entries(p.campos).map(([k,v])=>({k,v})),\n    }));\n\n    // voluntarios view\n    const AVA = ['#b5502e','#c98a2b','#6f7a4e','#9e3b2a'];\n    let volPool = this.voluntariosDef();\n    if (isLider) volPool = volPool.filter(v=>v.barraca===S.liderId);\n    const voluntariosView = volPool.map((v,i) => ({\n      nome:v.nome, funcao:v.funcao, turno:v.turno, horario:v.horario, ini:ini(v.nome),\n      barracaNome:this.barNome(v.barraca), avaCor:AVA[i%AVA.length],\n      conf:v.conf, confCor:CONF[v.conf].cor, confBg:CONF[v.conf].bg,\n      rowBg: v.conf==='pendente' ? '#faf3e4' : '#f3ead7',\n    }));\n    const volKpis = [\n      { valor:volPool.length, rotulo:'Voluntários cadastrados', cor:'#2e241c' },\n      { valor:volPool.filter(v=>v.conf==='confirmado').length, rotulo:'Confirmados', cor:'#5f7a3f' },\n      { valor:volPool.filter(v=>v.conf==='pendente').length, rotulo:'Aguardando confirmação', cor:'#c98a2b' },\n    ];\n\n    // aprovações\n    const TIPO = { interno:{label:'Contato interno · precisa aprovação',bg:'#f4ddd2',cor:'#9e3b2a'}, externo:{label:'Contato externo · só registro',bg:'#e6dac2',cor:'#6b5c48'} };\n    const STAT = {\n      aguardando:{label:'Aguardando análise',bg:'#eadfc9',cor:'#8a7a64',cor2:'#c98a2b'},\n      aprovada:{label:'Aprovada',bg:'#e7edda',cor:'#5f7a3f'},\n      reprovada:{label:'Reprovada',bg:'#f2d6cf',cor:'#9e3b2a'},\n      info:{label:'Informações solicitadas',bg:'#f6e9cf',cor:'#a2701c'},\n    };\n    const canDecide = isAdmin || isPastoral;\n    const aprovacoesView = this.aprovacoesDef().map(a => {\n      const dec = S.aprovDecisao[a.id];\n      const externo = a.tipo==='externo';\n      const status = externo ? 'aprovada' : (dec || 'aguardando');\n      const st = STAT[status];\n      const podeDecidir = canDecide && !externo && !dec;\n      return {\n        titulo:a.titulo, sub:a.sub, item:a.item, resp:a.resp,\n        tipoLabel:TIPO[a.tipo].label, tipoBg:TIPO[a.tipo].bg, tipoCor:TIPO[a.tipo].cor,\n        statusLabel: externo ? 'Registrado' : st.label, statusBg:st.bg, statusCor:st.cor,\n        cor: st.cor,\n        podeDecidir,\n        onAprovar:()=>this.decide(a.id,'aprovada'),\n        onReprovar:()=>this.decide(a.id,'reprovada'),\n        onInfo:()=>this.decide(a.id,'info'),\n      };\n    });\n\n    // checklist\n    const cdef = this.checklistDef();\n    let done=0, total=0;\n    const checklistView = cdef.map(sec => {\n      const itens = sec.itens.map((label,i) => {\n        const key = sec.id+'-'+i; const ok = !!S.chkDone[key]; total++; if(ok) done++;\n        return {\n          label, check: ok?'✓':'', deco: ok?'line-through':'none', cor: ok?'#8a7a64':'#2e241c',\n          boxBg: ok?'#5f7a3f':'transparent', boxBorda: ok?'#5f7a3f':'#c3ac86',\n          onToggle: () => this.toggleChk(key),\n        };\n      });\n      const secDone = sec.itens.filter((_,i)=>S.chkDone[sec.id+'-'+i]).length;\n      return { titulo:sec.titulo, cor:sec.cor, itens, progresso: secDone+'/'+sec.itens.length };\n    });\n    const chkPct = total ? Math.round(done/total*100)+'%' : '0%';\n\n    // login roles\n    const loginRoles = [\n      { nome:'Administrador', desc:'Acesso completo · estrutura e barracas', ini:'AD', cor:'#b5502e', onClick:()=>this.login('admin') },\n      { nome:'Líder de barraca', desc:'Somente a sua barraca', ini:'LB', cor:'#c98a2b', onClick:()=>this.login('lider') },\n      { nome:'Visualizador pastoral', desc:'Acompanhamento e aprovações', ini:'VP', cor:'#6f7a4e', onClick:()=>this.login('pastoral') },\n    ];\n\n    return {\n      notLogged: !S.logged, logged: S.logged,\n      isAdmin, isLider, isPastoral,\n      loginRoles,\n      navItems, roleTabs,\n      userNome:u.nome, userPapel:u.papel, userIni:u.ini, userCor:u.cor,\n      pageTitle, pageSub,\n      // screen flags\n      showDashAdmin: S.logged && (cur==='dashboard'),\n      showDashLider: S.logged && (cur==='lider'),\n      showBarracas: cur==='barracas',\n      showBarraca: cur==='barraca',\n      showTarefas: cur==='tarefas',\n      showProdutos: cur==='produtos',\n      showVoluntarios: cur==='voluntarios',\n      showAprovacoes: cur==='aprovacoes',\n      showEstrutura: cur==='estrutura',\n      showChecklist: cur==='checklist',\n      // nav helpers\n      goEstrutura:()=>this.go('estrutura'), goBarracas:()=>this.go('barracas'),\n      goAprovacoes:()=>this.go('aprovacoes'), backToBarracas:()=>this.go('barracas'),\n      logout:()=>this.logout(),\n      // dashboard\n      kpis, estrutura, estruturaView, barracas, aprovPreview, nAprov:nAprovPend, prazos, criticos,\n      // lider\n      minhaNome:mb?mb.nome:'', minhaPct:(mb?mb.pct:0)+'%', minhaCor:mb?this.SIT[mb.sit].cor:'#c98a2b',\n      minhaPrazo:mb?mb.prazo:'', minhaPend:mb?mb.pend:'', liderKpis,\n      // tarefas\n      taskFilters, tarefasView,\n      // produtos\n      produtosView,\n      // voluntarios\n      voluntariosView, volKpis,\n      // aprovacoes\n      aprovacoesView,\n      // detalhe\n      det,\n      // checklist\n      checklistView, chkPct, chkDone:done, chkTotal:total,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
